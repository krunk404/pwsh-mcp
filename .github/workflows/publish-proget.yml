name: Publish module to ProGet

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      MODULE_NAME: PowerShell.MCP
      CONFIGURATION: Release
      PROGET_URL: https://repo.nerdforge.dev/nuget/PowerShell/v3/index.json
      # Opt into Node 24 for actions now (Node 20 is deprecated June 2, 2026).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Build module DLL (net8.0)
        run: >
          dotnet build PowerShell.MCP/PowerShell.MCP.csproj
          -c $CONFIGURATION
          -f net8.0

      - name: Publish proxy for each RID
        # No upfront restore / --no-restore: each `dotnet publish -r <rid>` needs
        # its own RID-scoped restore, otherwise project.assets.json has no target
        # for the requested runtime.
        run: |
          set -euo pipefail
          for rid in win-x64 linux-x64 osx-x64 osx-arm64; do
            echo "::group::publish $rid"
            dotnet publish PowerShell.MCP.Proxy/PowerShell.MCP.Proxy.csproj \
              -c "$CONFIGURATION" \
              -r "$rid" \
              -o "staging/$MODULE_NAME/bin/$rid" \
              --self-contained
            echo "::endgroup::"
          done

      - name: Assemble module staging directory
        run: |
          set -euo pipefail
          STAGE="staging/$MODULE_NAME"
          BUILD_OUT="PowerShell.MCP/bin/$CONFIGURATION/net8.0"

          cp Staging/PowerShell.MCP.psd1 "$STAGE/"
          cp Staging/PowerShell.MCP.psm1 "$STAGE/"
          cp "$BUILD_OUT/PowerShell.MCP.dll" "$STAGE/"
          cp "$BUILD_OUT/Ude.NetStandard.dll" "$STAGE/"

          if ls "$BUILD_OUT/en-US/"*.xml >/dev/null 2>&1; then
            mkdir -p "$STAGE/en-US"
            cp "$BUILD_OUT/en-US/"*.xml "$STAGE/en-US/"
          fi

          echo "--- final staging tree ---"
          find "$STAGE" -maxdepth 3 -printf '%P\t%s\n' | sort

      - name: Publish to ProGet (NuGet v3 via PSResourceGet)
        shell: pwsh
        env:
          PROGET_API_KEY: ${{ secrets.PROGET_API_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'

          # PSResourceGet speaks NuGet v3. The older Publish-Module (PowerShellGet
          # 2.x) only speaks v2, so we use Publish-PSResource instead.
          Install-Module Microsoft.PowerShell.PSResourceGet -Force -AllowClobber -Scope CurrentUser
          Import-Module Microsoft.PowerShell.PSResourceGet

          Register-PSResourceRepository -Name ProGet `
            -Uri $env:PROGET_URL `
            -Trusted `
            -Force

          Publish-PSResource -Path "./staging/$env:MODULE_NAME" `
            -Repository ProGet `
            -ApiKey $env:PROGET_API_KEY `
            -Verbose
